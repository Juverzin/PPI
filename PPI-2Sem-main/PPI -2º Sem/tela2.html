<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotificAtraso - Seleção</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #fff;
        }

        h1 {
            color: #333;
            font-size: 2rem;
        }

        .btn-custom {
            background-color: #f6c300;
            color: #000;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 1rem 2rem;
            border-radius: 10px;
            border: 2px solid #333;
            text-transform: uppercase;
            width: 220px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-custom:hover {
            background-color: #e5b200;
            transform: translateY(-5px);
        }

        footer {
            background-color: #fff;
            border-top: 1px solid #ddd;
        }

    </style>
</head>
<body class="bg-light">

    <!-- Menu Superior -->
    <header class="d-flex justify-content-between align-items-center px-4 py-3 bg-light border-bottom">
        <button class="navbar-toggler" type="button" aria-label="Menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="d-flex align-items-center">
            <span class="fw-bold me-2">NotificAtraso</span>
            <img src="bell-icon.png" alt="Logo" class="img-fluid" style="width: 40px;">
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="container text-center py-5">
        <h1 class="fw-bold mb-4">Selecione a opção</h1>
        <div class="d-flex justify-content-center gap-4 flex-wrap">
            <a href="#" class="btn btn-custom shadow-sm">Registrar atraso</a>
            <a href="#" class="btn btn-custom shadow-sm">Editar atraso</a>
            <a href="#" class="btn btn-custom shadow-sm">Consultar histórico</a>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="text-center text-muted py-3 mt-auto">
        © 2024 Instituto Federal Farroupilha
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
